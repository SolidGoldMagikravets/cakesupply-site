<!DOCTYPE html>
<html>
  <head>
  <title>Cake Supply</title>
  <link rel="icon" href="pixilart-drawing.png">
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>

  <body>

    <div id="landing-page">
      <img src="primarylogo1.png" alt="Cake Supply" class="landing-logo">

      <div class="cake-3d-wrap">
        <div id="landing-cake-hero" class="landing-cake-hero" aria-hidden="true"></div>
        <div id="calculator-ui">
          <form class="calculator-search-row" action="javascript:void(0);">
            <input
              type="number"
              id="guest-count"
              placeholder="How many servings?"
              aria-label="How many servings?">

            <button id="calculate-btn" type="submit" aria-label="Find cake size">→</button>
          </form>
        </div>
      </div>

      <h2>About Me</h2>
      <p>
        The cake decorator unavoidably appropriates a customers excitement for their event as excitement about the bakers work.
      </p>

      <h2>Contact</h2>
      <p>Email me for custom cake inquiries.</p>
    </div>

<div id="recommendations-page" style="display: none;">
  <div class="recommendations-header">
    <button id="recommendations-back-btn" class="back-btn recommendations-back-btn" type="button">← Back</button>
  </div>
  <div id="cake-visuals"></div>
</div>
<div id="customizer" style="display: none;"></div>

<script type="module" src="script.js"></script>
</body>
</html>
