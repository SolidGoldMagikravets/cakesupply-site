<!DOCTYPE html>
<html>
  <head>
  <title>Cake Supply</title>
  <link rel="icon" href="pixilart-drawing.png">
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>

  <body>

    <h1>Cake Supply</h1>

<div class="cake-3d-wrap">
  <model-viewer
    id="cake-model"
    src="models/cake-config.glb"
    alt="3D cake model"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1.1"
    environment-image="neutral"
    class="cake-3d">
  </model-viewer>
</div>

<div id="calculator-ui">
  <h2>How many servings?</h2>

  <input type="number" id="guest-count" placeholder="Number of guests">

  <button id="calculate-btn">Find Cake Size</button>
</div>

<div id="cake-visuals"></div>
<div id="customizer" style="display: none;"></div>

<h2>About Me</h2>
<p>
  The cake decorator unavoidably appropriates a customers excitement for their event as excitement about the bakers work.
</p>

<h2>Contact</h2>
<p>Email me for custom cake inquiries.</p>

<script type="module" src="script.js"></script>
</body>
</html>
